name: Build Artifacts

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for artifacts (e.g., 2025.12.1)'
        required: true
        default: '2026.1.1'

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        with:
          fetch-depth: 0
      - name: Check if commit has release tag
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/heads/* ]] && git tag --points-at HEAD | grep -q '^v'; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping beta build: commit already has a release tag"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: pre-check
    if: needs.pre-check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            name: Linux-musl-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            name: Linux-musl-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
            echo "version=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build app
        run: cargo build --release --target ${{ matrix.target }} ${{ contains(matrix.target, 'musl') && '--no-default-features' || '' }}

      - name: Package archive (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          ARCHIVE_NAME="kiro-rs-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          STAGING_DIR="${ARCHIVE_NAME}"
          mkdir -p "${STAGING_DIR}"
          cp "target/${{ matrix.target }}/release/kiro-rs" "${STAGING_DIR}/"
          cp README.md LICENSE "${STAGING_DIR}/" 2>/dev/null || true
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${STAGING_DIR}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "asset_path=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "asset_sha=${ARCHIVE_NAME}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $archiveName = "kiro-rs-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          $stagingDir = $archiveName
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kiro-rs.exe" -Destination $stagingDir
          if (Test-Path README.md) { Copy-Item README.md -Destination $stagingDir }
          if (Test-Path LICENSE) { Copy-Item LICENSE -Destination $stagingDir }
          Compress-Archive -Path $stagingDir -DestinationPath "$archiveName.zip"
          $hash = Get-FileHash "$archiveName.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $archiveName.zip" | Out-File -Encoding ascii "$archiveName.zip.sha256"
          "asset_path=$archiveName.zip" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "asset_sha=$archiveName.zip.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiro-rs-${{ steps.version.outputs.version }}-${{ matrix.name }}
          if-no-files-found: error
          compression-level: 6
          path: |
            ${{ env.asset_path }}
            ${{ env.asset_sha }}

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
